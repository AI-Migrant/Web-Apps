<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keyboards</title>
  <style>
body
{
  background-color: black;
}


p
{
  box-sizing: border-box;
  margin: 0;
  text-align: right;
  font-size: 32px;
}


input[type='text']
{
  box-sizing: border-box;
  width: 100%;
  margin: 0;
  font-size: 26px;
  text-align: right;
}


@media (max-width: 480px) {
  button
  {
    height: 5vh;
    border-radius: 0.5em;
    font-size: 0.8em;
  }
}


@media (min-width: 481px) {
  button
  {
    height: 8vh;
    border-radius: 0.8em;
    font-size: 2.5em;
  }
}


#calculator
{
  width: 98%;
  border-radius: 10px;
  margin: 22vh auto 0;
  padding: 1%;
  background-color :grey;
}


.keyset
{
  display: grid;
  box-sizing: border-box;
  grid-template-columns: repeat(5, 1fr);
  gap: 1%;
  margin: 1% 0% 5%;
}


.hidden
{
  display: none;
}
  </style>
<script>
document.addEventListener("keydown", (e) => {
  if (e.key === "$") {
    console.log("User typed $ (likely Shift + 4 on US keyboard)");
  }
});



document.addEventListener("keydown", (e) => {
  if (e.key === "4" && e.shiftKey) {
    console.log("User pressed Shift + 4");
  }
});



document.addEventListener("keydown", (e) => {
  if (e.code === "Digit4" && e.shiftKey) {
    console.log("User pressed Shift + 4 (physical key)");
  }
});
</script>
</head>

<body>
  <div id="keyboard">
    <p id="oup"></p>
    <input type="text" id="inp" value="0">
    <div id="keypad">
      <div id="keyset_1" class="keyset">
        <button onclick="change_keyset()">Shift</button>
        <button onclick="store()">M+</button>
        <button onclick="recall()">MR</button>
        <button onclick="key_in('(')">(</button>
        <button onclick="key_in(')')">)</button>
      <button onclick="key_in('sin(')">sin</button>
      <button onclick="key_in('cos(')">cos</button>
      <button onclick="key_in('tan(')">tan</button>
      <button onclick="del()">DEL</button>
      <button onclick="all_clear()">AC</button>
      <button onclick="key_in('!')">x!</button>
      <button onclick="key_in('^(')">pow</button>
      <button onclick="key_in('log')">log</button>
      <button onclick="key_in('^2')">x²</button>
      <button onclick="key_in('√(')">√</button>
      <button onclick="key_in(7)">7</button>
      <button onclick="key_in(8)">8</button>
      <button onclick="key_in(9)">9</button>
      <button onclick="key_in('^(-1)')">1/x</button>
      <button onclick="key_in('%')">%</button>
      <button onclick="key_in(4)">4</button>
      <button onclick="key_in(5)">5</button>
      <button onclick="key_in(6)">6</button>
      <button onclick="key_in('×')">×</button>
      <button onclick="key_in('÷')">÷</button>
      <button onclick="key_in(1)">1</button>
      <button onclick="key_in(2)">2</button>
      <button onclick="key_in(3)">3</button>
      <button onclick="key_in('+')">+</button>
      <button onclick="key_in('-')">-</button>
      <button onclick="key_in('e')">e</button>
      <button onclick="key_in(0)">0</button>
      <button onclick="key_in('π')">π</button>
      <button onclick="key_in('.')">.</button>
      <button onclick="compute()">=</button>
      </div>
      <div id="keyset_2" class="keyset hidden">
        <button onclick="change_keyset()">Shift</button>
        <button onclick="store()">M+</button>
        <button onclick="recall()">MR</button>
        <button onclick="key_in('(')">(</button>
        <button onclick="key_in(')')">)</button>
      <button onclick="key_in('asin(')">asin</button>
      <button onclick="key_in('acos(')">acos</button>
      <button onclick="key_in('atan(')">atan</button>
      <button onclick="del()">DEL</button>
      <button onclick="all_clear()">AC</button>
      <button onclick="key_in('P')">nPk</button>
      <button onclick="key_in('C')">nCk</button>
      <button onclick="key_in('Px==(')">Px</button>
      <button onclick="key_in('PX<=(')">P(X&le;)</button>
      <button onclick="key_in('PX>=(')">P(X&ge;)</button>
      <button onclick="key_in(7)">7</button>
      <button onclick="key_in(8)">8</button>
      <button onclick="key_in(9)">9</button>
      <button onclick="key_in('^(-1)')">1/x</button>
      <button onclick="key_in('%')">%</button>
      <button onclick="key_in(4)">4</button>
      <button onclick="key_in(5)">5</button>
      <button onclick="key_in(6)">6</button>
      <button onclick="key_in('×')">×</button>
      <button onclick="key_in('÷')">÷</button>
      <button onclick="key_in(1)">1</button>
      <button onclick="key_in(2)">2</button>
      <button onclick="key_in(3)">3</button>
      <button onclick="key_in('+')">+</button>
      <button onclick="key_in('-')">-</button>
      <button onclick="key_in('e')">e</button>
      <button onclick="key_in(0)">0</button>
      <button onclick="key_in(',')">,</button>
      <button onclick="key_in('.')">.</button>
      <button onclick="compute()">=</button>
      </div>
    </div>
  </div>
</body>

</html>
